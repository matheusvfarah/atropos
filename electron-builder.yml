appId: com.atropos.app
productName: Atropos
copyright: Copyright © 2026 Matheus Farah

directories:
  output: dist/

files:
  - electron/**
  - renderer/**
  - zelador/**
  - assets/**
  - package.json
  - "!**/.env"
  - "!**/node_modules/.cache"
  - "!**/zelador/node_modules/.cache"

win:
  target: nsis
  icon: assets/icon.ico

mac:
  target: dmg
  icon: assets/icon.icns
  category: public.app-category.productivity

linux:
  target: AppImage
  icon: assets/icon.png

publish:
  provider: github
  owner: matheusnmto
  repo: liquid-graph

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true